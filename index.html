<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Family Trips</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap');
:root {
    --bg: #f6f1ea;
    --paper: #fffdf9;
    --ink: #1f2937;
    --muted: #5b6573;
    --line: #ddd3c7;
    --accent: #a85f3f;
    --accent-2: #d8b58a;
    --sea: #5f7f8f;
    --radius: 16px;
    --shadow: 0 4px 20px rgba(40,36,30,0.08);
}
* { box-sizing: border-box; margin: 0; padding: 0; }
body {
    font-family: "Inter", sans-serif;
    background: var(--bg);
    color: var(--ink);
    min-height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 24px;
}
.container {
    max-width: 600px;
    width: 100%;
}
.hero {
    background: linear-gradient(135deg, #2c1810, var(--accent), #c47a55);
    border-radius: var(--radius) var(--radius) 0 0;
    padding: 40px 36px 28px;
    color: #fff;
}
.hero h1 {
    font-size: 28px;
    font-weight: 800;
    letter-spacing: -0.5px;
    margin-bottom: 6px;
}
.hero p {
    font-size: 14px;
    color: rgba(255,255,255,0.7);
}
.trips {
    background: var(--paper);
    border-radius: 0 0 var(--radius) var(--radius);
    box-shadow: var(--shadow);
    padding: 8px 0;
}
.trip-card {
    display: flex;
    align-items: center;
    gap: 16px;
    padding: 18px 28px;
    border-bottom: 1px solid var(--line);
    text-decoration: none;
    color: var(--ink);
    transition: background 0.15s;
}
.trip-card:last-child { border-bottom: none; }
.trip-card:hover { background: rgba(246,241,234,0.6); }
.trip-icon {
    font-size: 28px;
    width: 48px;
    height: 48px;
    display: flex;
    align-items: center;
    justify-content: center;
    background: var(--bg);
    border-radius: 12px;
    flex-shrink: 0;
}
.trip-info h3 {
    font-size: 15px;
    font-weight: 700;
    margin-bottom: 3px;
}
.trip-info p {
    font-size: 12px;
    color: var(--muted);
}
.trip-arrow {
    margin-left: auto;
    color: var(--accent-2);
    font-size: 18px;
}
.footer {
    text-align: center;
    margin-top: 20px;
    font-size: 11px;
    color: var(--muted);
}
</style>
</head>
<body>
<div class="container">
    <div class="hero">
        <h1>Family Trips</h1>
        <p>Interactive itineraries by Phoebe</p>
    </div>
    <div class="trips">
        <a class="trip-card" href="solvang-mar2026/">
            <div class="trip-icon">&#127796;</div>
            <div class="trip-info">
                <h3>Solvang & Santa Barbara</h3>
                <p>March 30 - April 2, 2026 &middot; 4 days &middot; Family</p>
            </div>
            <span class="trip-arrow">&rsaquo;</span>
        </a>
    </div>
    <div class="footer">Generated by Phoebe &middot; Dan's Personal AI</div>
</div>
</body>
</html>
